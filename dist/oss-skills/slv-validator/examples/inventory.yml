# SLV Validator — Example Inventory
#
# Generated by `slv v init` during interactive setup, or hand-written.
# All variables can also be passed via ansible-playbook -e (extra_vars).
#
# Usage:
#   slv v deploy -n mainnet -p validator-primary
# or directly:
#   ansible-playbook -i inventory.yml mainnet-validator/init.yml
#
# Or with extra_vars override:
#   ansible-playbook -i inventory.yml mainnet-validator/init.yml \
#     -e '{"validator_type":"allnodes-jito","allnodes_jito_version":"3.1.14"}'

all:
  hosts:
    validator-primary:
      ansible_host: "<server-ip>"
      ansible_user: "solv"
      ansible_ssh_private_key_file: "~/.ssh/id_rsa"

  vars:
    # --- Validator Type ---
    # Options: jito, allnodes-jito, agave, firedancer-agave, firedancer-jito
    validator_type: "jito"

    # --- Versions (or set in ~/.slv/versions.yml under mainnet_validators / testnet_validators) ---
    # solana_version: "3.1.14"             # for validator_type=agave
    # jito_version: "3.1.14-jito"          # for validator_type=jito
    # allnodes_jito_version: "3.1.14"      # for validator_type=allnodes-jito (template appends -allnodes)
    # firedancer_version: "0.305.20104"    # for validator_type=firedancer-*

    # --- Identity ---
    identity_account: "<validator-identity-pubkey>"
    vote_account: "<vote-account-pubkey>"

    # --- Snapshot ---
    # Auto-detected for ERPC nodes; otherwise provide manually
    snapshot_url: ""

    # --- Commission ---
    commission_bps: 0

    # --- Network ---
    dynamic_port_range: "8000-8025"
    limit_ledger_size: 200000000

    # --- Jito (mainnet only, when validator_type is jito or allnodes-jito) ---
    # block_engine_url: "https://frankfurt.mainnet.block-engine.jito.wtf"
    #
    # shred_receiver_address accepts either a single string or a YAML list.
    # A list emits one --shred-receiver-address flag per entry:
    # shred_receiver_address: "64.130.50.14:1002"
    # shred_receiver_address:
    #   - "64.130.50.14:1002"
    #   - "<additional-receiver>:<port>"
    #
    # bam_url is optional. When set, the validator starts with --bam-url and
    # joins the BAM pipeline. Replaces the removed `jito-bam` validator_type.
    # bam_url: "http://<region>.mainnet.bam.jito.wtf"

    # --- Testnet Only (epoch-dependent, check Solana docs) ---
    # expected_shred_version: ""
    # expected_bank_hash: ""
    # wait_for_supermajority: ""

    # --- Performance Tuning (auto-managed by init) ---
    smt_disable: false
    irq_tuning: false
    cpu_boost: false
    need_reboot: false
