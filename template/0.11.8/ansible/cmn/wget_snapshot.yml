---
- name: Wget Snapshot
  hosts: all
  become: true
  become_user: solv

  tasks:
    - name: Auto-detect nearest snapshot region
      shell: |
        best_region=""
        best_latency=9999
        for region in ams fra lon ny tokyo sgp chi; do
          avg=$(ping -c 3 -W 2 -q "solana-snapshot-${region}.erpc.global" 2>/dev/null \
                | awk -F'/' '/rtt min/{print $5}')
          if [ -n "$avg" ]; then
            # Compare as integers (multiply by 10 to avoid float issues)
            avg_int=$(echo "$avg" | awk '{printf "%d", $1}')
            if [ "$avg_int" -lt "$best_latency" ]; then
              best_latency=$avg_int
              best_region=$region
            fi
          fi
        done
        if [ -n "$best_region" ]; then
          echo "https://solana-snapshot-${best_region}.erpc.global"
        else
          echo ""
        fi
      args:
        executable: /bin/bash
      register: detected_snapshot_url
      changed_when: false
      when: snapshot_url is not defined or snapshot_url == ""

    - name: Set snapshot_url from auto-detection
      set_fact:
        snapshot_url: "{{ detected_snapshot_url.stdout | trim }}"
      when:
        - (snapshot_url is not defined or snapshot_url == "")
        - detected_snapshot_url.stdout is defined
        - detected_snapshot_url.stdout | trim != ""

    - name: Display selected snapshot region
      debug:
        msg: "📍 Snapshot URL: {{ snapshot_url }}"
      when: snapshot_url is defined and snapshot_url != ""

    - name: Wget Snapshot
      shell: |
        cd /mnt/snapshot
        wget -c --trust-server-names {{ snapshot_url }}/snapshot.tar.bz2
        wget -c --trust-server-names {{ snapshot_url }}/incremental-snapshot.tar.bz2
      args:
        chdir: /mnt/snapshot
        executable: /bin/bash
      async: 3600
      poll: 10
      failed_when: false
      when: snapshot_url is defined and snapshot_url != ""

    - name: Skip snapshot download (no URL available)
      debug:
        msg: "⚠️ No snapshot URL configured or detected. Skipping snapshot download."
      when: snapshot_url is not defined or snapshot_url == ""
