---
- name: Deposit DoubleZero validator funds
  hosts: all
  become: yes
  gather_facts: false

  vars:
    doublezero_env: 'mainnet-beta'
    doublezero_deposit_fund: '3'
    doublezero_keypair_path: '/home/solv/mainnet-validator-keypair.json'

  pre_tasks:
    - name: Check SSH reachability
      wait_for_connection:
        timeout: 10
      register: conn_check
      ignore_errors: true
      ignore_unreachable: true

    - meta: end_host
      when: conn_check.unreachable | default(false) or conn_check.failed | default(false)

  tasks:
    - name: Deposit validator funds
      ansible.builtin.command:
        argv:
          - doublezero-solana
          - revenue-distribution
          - validator-deposit
          - --node-id
          - '{{ identity_account }}'
          - --fund
          - '{{ doublezero_deposit_fund }}'
          - -u
          - '{{ doublezero_env }}'
          - -k
          - '{{ doublezero_keypair_path }}'
      register: dz_deposit
      changed_when: dz_deposit.rc == 0
      failed_when: dz_deposit.rc != 0

    - name: Show deposit result
      ansible.builtin.debug:
        msg: '{{ dz_deposit.stdout_lines | default(["(no output)"]) }}'
