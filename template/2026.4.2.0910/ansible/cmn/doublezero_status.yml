---
- name: Check DoubleZero status
  hosts: all
  become: yes
  gather_facts: false

  vars:
    doublezero_env: 'mainnet-beta'

  pre_tasks:
    - name: Check SSH reachability
      wait_for_connection:
        timeout: 10
      register: conn_check
      ignore_errors: true
      ignore_unreachable: true

    - meta: end_host
      when: conn_check.unreachable | default(false) or conn_check.failed | default(false)

  tasks:
    - name: Check doublezerod systemd state
      ansible.builtin.command: systemctl is-active doublezerod
      register: dz_service
      changed_when: false
      failed_when: false

    - name: Show doublezerod systemd state
      ansible.builtin.debug:
        msg: 'doublezerod service: {{ dz_service.stdout | default("unknown") }}'

    - name: Check DoubleZero status
      ansible.builtin.command: doublezero status
      register: dz_status
      changed_when: false

    - name: Show DoubleZero status
      ansible.builtin.debug:
        msg: '{{ dz_status.stdout_lines | default(["(no output)"]) }}'

    - name: Get DoubleZero address
      ansible.builtin.command: doublezero address
      register: dz_address
      changed_when: false

    - name: Show DoubleZero address
      ansible.builtin.debug:
        msg: 'DoubleZero address: {{ dz_address.stdout | default("(no output)") }}'

    - name: Fetch DoubleZero validator deposits
      ansible.builtin.command:
        argv:
          - doublezero-solana
          - revenue-distribution
          - fetch
          - validator-deposits
          - -u
          - '{{ doublezero_env }}'
          - --node-id
          - '{{ identity_account }}'
      register: dz_deposits
      changed_when: false

    - name: Show DoubleZero validator deposits
      ansible.builtin.debug:
        msg: '{{ dz_deposits.stdout_lines | default(["(no output)"]) }}'
