---
- name: Disconnect DoubleZero
  hosts: all
  become: yes
  gather_facts: false

  pre_tasks:
    - name: Check SSH reachability
      wait_for_connection:
        timeout: 10
      register: conn_check
      ignore_errors: true
      ignore_unreachable: true

    - meta: end_host
      when: conn_check.unreachable | default(false) or conn_check.failed | default(false)

  tasks:
    - name: Disconnect from DoubleZero
      ansible.builtin.command: doublezero disconnect
      register: dz_disconnect
      changed_when: dz_disconnect.rc == 0
      failed_when: dz_disconnect.rc != 0

    - name: Check DoubleZero status
      ansible.builtin.command: doublezero status
      register: dz_status
      changed_when: false
      ignore_errors: true

    - name: Show DoubleZero status
      ansible.builtin.debug:
        msg: '{{ dz_status.stdout_lines | default(["(no output)"]) }}'
