---
- name: Run Command
  hosts: all
  become: true
  become_user: solv
  gather_facts: no
  tasks:
    - name: Stop Firedancer
      shell: . ~/.profile && sudo systemctl stop firedancer
      register: command_output

    - name: Display Command output
      debug:
        msg: 'Stop Firedancer: {{ command_output.stdout }}'

    - name: Remove Firedancer workspace files
      shell: sudo rm -f /mnt/.gigantic/*.wksp
      register: command_output_rm
