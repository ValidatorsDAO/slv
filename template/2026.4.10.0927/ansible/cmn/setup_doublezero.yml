---
- name: Install and configure DoubleZero
  hosts: all
  become: yes
  gather_facts: false

  vars:
    doublezero_env: 'mainnet-beta'
    doublezero_connect_provider: 'ibrl'
    doublezero_repo_script: >-
      {{
        'https://dl.cloudsmith.io/public/malbeclabs/doublezero-testnet/setup.deb.sh'
        if doublezero_env == 'testnet'
        else 'https://dl.cloudsmith.io/public/malbeclabs/doublezero/setup.deb.sh'
      }}

  pre_tasks:
    - name: Check SSH reachability
      wait_for_connection:
        timeout: 10
      register: conn_check
      ignore_errors: true
      ignore_unreachable: true

    - meta: end_host
      when: conn_check.unreachable | default(false) or conn_check.failed | default(false)

  tasks:
    - name: Remove existing DoubleZero apt sources
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - /etc/apt/sources.list.d/malbeclabs-doublezero.list
        - /etc/apt/sources.list.d/malbeclabs-doublezero.sources
        - /etc/apt/sources.list.d/malbeclabs-doublezero-testnet.list
        - /etc/apt/sources.list.d/malbeclabs-doublezero-testnet.sources
        - /usr/share/keyrings/malbeclabs-doublezero-archive-keyring.gpg
        - /usr/share/keyrings/malbeclabs-doublezero-testnet-archive-keyring.gpg

    - name: Add DoubleZero apt repository
      ansible.builtin.shell: |
        curl -1sLf {{ doublezero_repo_script }} | bash

    - name: Install doublezero package
      ansible.builtin.apt:
        name: doublezero
        state: present
        update_cache: yes

    - name: Check if DoubleZero key already exists
      ansible.builtin.stat:
        path: /etc/doublezero/keys/dz.key
      register: dz_key_file

    - name: Generate DoubleZero keys
      ansible.builtin.command: doublezero keygen
      when: not dz_key_file.stat.exists

    - name: Create systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/doublezerod.service.d
        state: directory
        mode: '0755'

    - name: Write systemd override for environment
      ansible.builtin.copy:
        dest: /etc/systemd/system/doublezerod.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          ExecStart=
          ExecStart=/usr/bin/doublezerod -sock-file /run/doublezerod/doublezerod.sock -env {{ doublezero_env }}
      notify: Restart doublezerod

    - name: Set DoubleZero CLI config environment
      ansible.builtin.command: doublezero config set --env {{ doublezero_env }}
      changed_when: true

    - name: Allow GRE protocol (INPUT)
      ansible.builtin.iptables:
        chain: INPUT
        protocol: gre
        jump: ACCEPT
        comment: 'DoubleZero GRE INPUT'

    - name: Allow GRE protocol (OUTPUT)
      ansible.builtin.iptables:
        chain: OUTPUT
        protocol: gre
        jump: ACCEPT
        comment: 'DoubleZero GRE OUTPUT'

    - name: Allow BGP on doublezero0 (INPUT)
      ansible.builtin.iptables:
        chain: INPUT
        in_interface: doublezero0
        source: 169.254.0.0/16
        destination: 169.254.0.0/16
        protocol: tcp
        destination_port: '179'
        jump: ACCEPT
        comment: 'DoubleZero BGP INPUT'

    - name: Allow BGP on doublezero0 (OUTPUT)
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: doublezero0
        source: 169.254.0.0/16
        destination: 169.254.0.0/16
        protocol: tcp
        destination_port: '179'
        jump: ACCEPT
        comment: 'DoubleZero BGP OUTPUT'

    - name: Persist iptables rules
      ansible.builtin.apt:
        name: iptables-persistent
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Save iptables rules
      ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
      changed_when: true

    - name: Reload systemd and start doublezerod
      ansible.builtin.systemd:
        name: doublezerod
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Connect to DoubleZero provider
      ansible.builtin.command: doublezero connect {{ doublezero_connect_provider }}
      register: dz_connect
      changed_when: "'up' in dz_connect.stdout or dz_connect.rc == 0"
      failed_when: dz_connect.rc != 0

    - name: Check DoubleZero status
      ansible.builtin.command: doublezero status
      register: dz_status
      changed_when: false
      ignore_errors: true

    - name: Show DoubleZero status
      ansible.builtin.debug:
        msg: '{{ dz_status.stdout_lines | default(["(no output)"]) }}'

    - name: Get DoubleZero address
      ansible.builtin.command: doublezero address
      register: dz_address
      changed_when: false

    - name: Emit DoubleZero address marker
      ansible.builtin.debug:
        msg: 'SLV_DOUBLEZERO_ADDRESS {{ inventory_hostname }} {{ dz_address.stdout | trim }}'

  handlers:
    - name: Restart doublezerod
      ansible.builtin.systemd:
        name: doublezerod
        state: restarted
        daemon_reload: yes
