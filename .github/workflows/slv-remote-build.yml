name: SLV Tests and Release

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix, e.g. 2026.4.21.0727). The corresponding tag v<version> must already exist; workflow_dispatch is intended for recovery / re-runs against an existing tag."
        required: true

jobs:
  build-mac:
    name: Build macOS Binaries (x86_64 + arm64)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure api/slv-api/deno.json exists
        run: |
          if [ ! -f api/slv-api/deno.json ]; then
            mkdir -p api/slv-api
            printf '{\n}\n' > api/slv-api/deno.json
          fi

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.5

      - name: Build macOS executables (x86_64 and arm64)
        run: |
          deno install --allow-scripts=npm:protobufjs@7.4.0
          deno i
          deno task build:mac
          deno task build:mac-arm64

      - name: Upload macOS x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: slv-macos-binary
          path: dist/slv-x86_64-apple-darwin-exe.tar.gz
          retention-days: 1

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: slv-macos-arm64-binary
          path: dist/slv-aarch64-apple-darwin-exe.tar.gz
          retention-days: 1

  test:
    name: Run Tests
    runs-on: [slv-bm-runners, slv-bm-runners]
    steps:
      - name: Pre-clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "Invalid GITHUB_WORKSPACE: '$GITHUB_WORKSPACE'"
            exit 1
          fi
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?*

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Ensure full checkout
        shell: bash
        run: |
          set -euo pipefail
          required_files=(cli/deno.json test-solana-key/test.ts)
          missing=()
          for f in "${required_files[@]}"; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required files: ${missing[*]}"
            git status --porcelain=v1 || true
            ls -la || true
            exit 1
          fi
          # Deno workspace expects api/slv-api/deno.json; create a stub if missing in older tags.
          if [ ! -f api/slv-api/deno.json ]; then
            echo "api/slv-api/deno.json missing; creating stub for workspace compatibility"
            mkdir -p api/slv-api
            printf '{\n}\n' > api/slv-api/deno.json
          fi

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.5

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          # Run CLI tests from its own directory to avoid root workspace resolution
          (cd cli && deno test -A --config=deno.json test)
          # Run the standalone test without loading root config/workspace
          deno test -A --no-config test-solana-key/test.ts

  remote-build:
    name: Remote Build and Release
    needs:
      - test
      - build-mac
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: [slv-bm-runners]
    permissions:
      contents: write
    steps:
      - name: Pre-clean workspace
        run: |
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "Invalid GITHUB_WORKSPACE: '$GITHUB_WORKSPACE'"
            exit 1
          fi
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.[!.]* "$GITHUB_WORKSPACE"/..?*

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Ensure full checkout
        shell: bash
        run: |
          set -euo pipefail
          required_files=(ansible/compile-slv.yml)
          missing=()
          for f in "${required_files[@]}"; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required files: ${missing[*]}"
            git status --porcelain=v1 || true
            ls -la || true
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Extract version
        id: get_version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "❌ workflow_dispatch requires 'version' input"
              exit 1
            fi
            # workflow_dispatch assumes the tag v<version> already exists
            # (this workflow is for recovery / re-run, not tag creation).
            if ! git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
              echo "❌ tag v${VERSION} does not exist. Create and push the tag first, or run from a tag push."
              exit 1
            fi
          else
            # tag push: refs/tags/vX.Y.Z -> X.Y.Z
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "Resolved VERSION=${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create artifacts directory
        run: mkdir -p artifacts dist renamed_files

      - name: Download macOS x86_64 artifact from build-mac job
        uses: actions/download-artifact@v4
        with:
          name: slv-macos-binary
          path: dist/

      - name: Download macOS arm64 artifact from build-mac job
        uses: actions/download-artifact@v4
        with:
          name: slv-macos-arm64-binary
          path: dist/

      - name: Compile SLV on remote server
        run: |
          export ANSIBLE_ALLOW_WORLD_READABLE_TMPFILES=1
          ansible-playbook -i 'localhost,' -u solv -c local ansible/compile-slv.yml \
            -e "version=${{ env.VERSION }}" \
            -e "github_token=${{ secrets.GITHUB_TOKEN }}" \
            -e "cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -e "cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -e "cloudflare_purge_email=${{ secrets.CLOUDFLARE_PURGE_EMAIL }}" \
            -e "cloudflare_purge_api_token=${{ secrets.CLOUDFLARE_PURGE_API_TOKEN }}" \
            -e "cloudflare_email=${{ secrets.CLOUDFLARE_EMAIL }}" \
            -e "cloudflare_api_key=${{ secrets.CLOUDFLARE_API_KEY }}" \
            -e "cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Debug directories
        run: |
          echo "Listing artifacts directory content:"
          ls -la artifacts/ || echo "artifacts directory not found or empty"
          echo "Listing dist directory content:"
          ls -la dist/ || echo "dist directory not found or empty"
          echo "Current working directory:"
          pwd

      - name: Ensure Linux binaries in dist
        run: |
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            if [ ! -f "dist/slv-${target}-exe.tar.gz" ] && [ -f "/opt/slv-build/dist/slv-${target}-exe.tar.gz" ]; then
              cp "/opt/slv-build/dist/slv-${target}-exe.tar.gz" dist/
              echo "Copied ${target} binary from build dir"
            fi
          done
          echo "dist/ contents:" && ls -la dist/

      - name: Copy SHA256SUMS from build directory
        run: |
          if [ ! -f "dist/SHA256SUMS" ] && [ -f "/opt/slv-build/dist/SHA256SUMS" ]; then
            cp /opt/slv-build/dist/SHA256SUMS dist/
            echo "Copied SHA256SUMS from build dir"
          fi
          if [ -f "dist/SHA256SUMS" ]; then
            echo "SHA256SUMS contents:"
            cat dist/SHA256SUMS
          else
            echo "❌ FATAL: SHA256SUMS not found in dist/"
            exit 1
          fi

      - name: Rename files to match download script expectations
        run: |
          for target in x86_64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin aarch64-unknown-linux-gnu; do
            if [ -f "dist/slv-${target}-exe.tar.gz" ]; then
              cp "dist/slv-${target}-exe.tar.gz" "renamed_files/${target}-exe.tar.gz"
              echo "Renamed ${target} executable for GitHub release"
            else
              echo "${target} executable not found in dist directory"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            dist/slv-x86_64-unknown-linux-gnu-exe.tar.gz
            dist/slv-x86_64-apple-darwin-exe.tar.gz
            dist/slv-aarch64-apple-darwin-exe.tar.gz
            dist/slv-aarch64-unknown-linux-gnu-exe.tar.gz
            dist/SHA256SUMS
          body: |
            SLV v${{ env.VERSION }} Release (Remote Build)

            ## Changes

            - See commit history for details
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OpenClaw skills
        run: |
          for skill in validator rpc grpc-geyser; do
            bash build-skill.sh "$skill" "${{ env.VERSION }}"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install clawhub CLI and publish skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npm i -g clawhub
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          for skill_dir in oss-skills/slv-validator oss-skills/slv-rpc oss-skills/slv-grpc-geyser oss-skills/slv-benchmark; do
            if [ -d "$skill_dir" ]; then
              echo "Publishing $skill_dir..."
              clawhub publish "$skill_dir" --version "${{ env.VERSION }}" || echo "Warning: publish failed for $skill_dir (may already exist), continuing..."
            else
              echo "Warning: $skill_dir not found, skipping"
            fi
          done
